<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #0f172a; }
body { font-family: 'Segoe UI', sans-serif; color: #cbd5e1; width: 520px; padding: 14px 16px 12px; border: 3px solid #ef4444; border-radius: 4px; background: #0f172a; box-shadow: 0 8px 32px rgba(239,68,68,0.3); }
.hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.hdr-title { flex: 1; font-size: 14px; font-weight: 900; color: #ef4444; letter-spacing: -0.01em; }
.hdr-close { font-size: 20px; cursor: pointer; opacity: 0.5; background: none; border: none; color: #cbd5e1; line-height: 1; padding: 0 2px; }
.hdr-close:hover { opacity: 1; }
.rule-row { font-size: 11px; font-weight: 900; color: #3abff8; margin-bottom: 3px; }
.cnt-row  { font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 10px; }
.items { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.item { display: flex; flex-direction: column; gap: 3px; padding: 8px 10px; background: #1e293b; border-radius: 7px; border: 1.5px solid #334155; }
.item-tid   { font-size: 12px; font-weight: 900; color: #38bdf8; letter-spacing: 0.03em; }
.item-row2  { display: flex; align-items: center; gap: 6px; }
.item-title { flex: 1; font-size: 11px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #e2e8f0; }
.item-price { font-size: 12px; font-weight: 900; color: #ef4444; flex-shrink: 0; }
.block-btn  { margin-top: 3px; font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid #f87171; color: #f87171; background: none; cursor: pointer; align-self: flex-start; }
.block-btn:disabled { opacity: 0.4; cursor: default; }
.prog-wrap { height: 3px; background: #334155; border-radius: 2px; overflow: hidden; }
.prog-bar  { height: 100%; background: #ef4444; width: 100%; transition: width 60s linear; }
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">🚨 IMI PRO — 물품 감지!</div>
  <button class="hdr-close" id="closeBtn">×</button>
</div>
<div class="rule-row" id="ruleName"></div>
<div class="cnt-row"  id="itemCount"></div>
<div class="items"    id="itemList"></div>
<div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
<script src="alert_popup.js"></script>
</body>
</html>
