<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #0f172a; }
body { font-family: 'Segoe UI', sans-serif; color: #cbd5e1; width: 420px; padding: 14px 16px 12px; border: 3px solid #22c55e; border-radius: 4px; background: #0f172a; box-shadow: 0 8px 32px rgba(34,197,94,0.3); }
.hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.hdr-title { flex: 1; font-size: 14px; font-weight: 900; color: #22c55e; letter-spacing: -0.01em; }
.hdr-close { font-size: 20px; cursor: pointer; opacity: 0.5; background: none; border: none; color: #cbd5e1; line-height: 1; padding: 0 2px; }
.hdr-close:hover { opacity: 1; }
.rule-row { font-size: 11px; font-weight: 900; color: #3abff8; margin-bottom: 3px; }
.cnt-row  { font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 10px; }
.items { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.item { display: flex; flex-direction: column; gap: 4px; padding: 8px 10px; background: #1e293b; border-radius: 7px; border: 1.5px solid #334155; cursor: pointer; transition: border-color 0.15s; text-decoration: none; }
.item:hover { border-color: #22c55e; }
.item-tid   { font-size: 20px; font-weight: 900; color: #38bdf8; letter-spacing: 0.03em; line-height: 1.1; }
.item-row2  { display: flex; align-items: center; gap: 6px; }
.item-title { flex: 1; font-size: 12px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #e2e8f0; }
.item-price { font-size: 12px; font-weight: 900; color: #22c55e; flex-shrink: 0; }
.no-link { color: #94a3b8; }
.prog-wrap { height: 3px; background: #334155; border-radius: 2px; overflow: hidden; }
.prog-bar  { height: 100%; background: #22c55e; width: 100%; transition: width 60s linear; }
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">📦 IMI PRO — 비거래 물품 감지!</div>
  <button class="hdr-close" id="closeBtn">×</button>
</div>
<div class="rule-row" id="ruleName"></div>
<div class="cnt-row"  id="itemCount"></div>
<div class="items"    id="itemList"></div>
<div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
<script src="watch_popup.js"></script>
</body>
</html>
